apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibm-icn-operator
  labels:
    app.kubernetes.io/instance: ibm-icn
    app.kubernetes.io/managed-by: ibm-icn
    app.kubernetes.io/name: ibm-icn
    release: 26.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      name: ibm-icn-operator
  template:
    metadata:
      labels:
        name: ibm-icn-operator
        app.kubernetes.io/instance: ibm-icn
        app.kubernetes.io/managed-by: ibm-icn
        app.kubernetes.io/name: ibm-icn
        com.ibm.fncm.networking/egress-deny-all: "true"
        com.ibm.fncm.networking/egress-allow-same-namespace: "true"
        com.ibm.fncm.networking/egress-allow-k8s-services: "true"
        com.ibm.fncm.networking/egress-allow-all: "true"
        com.ibm.fncm.networking/egress-allow-ldap: "true"
        com.ibm.fncm.ecm.networking/egress-allow-db: "true"
        release: 26.0.0
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        runAsNonRoot: true
        # Uncomment to specify the RunAsUser for the security context of the pod.
        # This is usually a numeric value that corresponds to a user ID.
        # runAsUser: 1001
        # Uncomment to specify the fsGroup for the security context of the pod.
        # fsGroup: 0
        # Uncomment this to enable seccomp profile on OCP 4.12+
        # seccompProfile:
        #   type: RuntimeDefault
      serviceAccountName: ibm-icn-operator
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                      - s390x
                      - ppc64le
            weight: 3
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                      - s390x
                      - ppc64le
      # Uncomment and configure tolerations to allow the pod to be scheduled on nodes with specific taints
      # tolerations:
      # - key: "key1"
      #   operator: "Equal"
      #   value: "value1"
      #   effect: "NoSchedule"
      # - key: "key2"
      #   operator: "Exists"
      #   effect: "NoExecute"
      #   tolerationSeconds: 3600
      initContainers:
        - name: folder-prepare-container
          image: "icr.io/cpopen/icp4a-content-operator@sha256:a03619f20f2b49857d362aa1e9d31a6349a78d09eebea862fafa9e1b9ffa05c1"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: license-folder-pvc
              mountPath: /license-folder
            - name: ansible-folder-pvc
              mountPath: /ansible-folder
            - name: tmp-folder-pvc
              mountPath: /tmp-folder
            - name: log-folder-pvc
              mountPath: /log-folder
            - name: ibm-folder-pvc
              mountPath: /ibm-folder
          command:
            - "/bin/sh"
            - "-ecx"
            - >
              rm -rf /license-folder/* && rm -rf /tmp-folder/* && rm -rf /ansible-folder/* && rm -rf /log-folder/* && rm -rf /ibm-folder/* &&
              cp -rp /licenses/* /license-folder && 
              mkdir -p /ansible-folder/.ansible &&
              cp -rp /opt/ansible/* /ansible-folder &&
              cp -rp /opt/ansible/.ansible/* /ansible-folder/.ansible &&
              cp -rp /opt/ibm/* /ibm-folder
      containers:
        - name: operator
          image: "icr.io/cpopen/icp4a-content-operator@sha256:a03619f20f2b49857d362aa1e9d31a6349a78d09eebea862fafa9e1b9ffa05c1"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 256Mi
          args:
            - --zap-encoder=console
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 6789
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 6789
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_NAME
              value: "ibm-icn-operator"
            - name: MAX_CONCURRENT_RECONCILES_ICP4ACLUSTER_ICP4A_IBM_COM
              value: "10"
            - name: ANSIBLE_GATHERING
              value: "smart"
            # MUST exist, used to accept dba license, valid value only can be "accept"
            - name: fncm_license
              value: "accept"
          volumeMounts:
            - name: license-folder-pvc
              mountPath: /licenses
            - name: ansible-folder-pvc
              mountPath: /opt/ansible
            - name: tmp-folder-pvc
              mountPath: /tmp
            - name: log-folder-pvc
              mountPath: /logs
            - name: ibm-folder-pvc
              mountPath: /opt/ibm
      imagePullSecrets:
      - name: "ibm-entitlement-key"
      volumes:
        - name: license-folder-pvc
          emptyDir: {}
        - name: tmp-folder-pvc
          emptyDir: {}
        - name: ansible-folder-pvc
          emptyDir: {}
        - name: log-folder-pvc
          emptyDir: {}
        - name: ibm-folder-pvc
          emptyDir: {}
